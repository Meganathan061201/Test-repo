<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-3xl font-bold underline ">
      Hello world!
    </h1>

    <div class="text-3xl font-bold underline ">
        <p class="text-3xl font-bold underline ">
            This is a paragraph.
        </p>
        <br>
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        <button class="text-3xl font-bold underline " id="button">
            Click me
        </button>
        <input class="text-3xl font-bold underline " id="input" type="text" placeholder="Enter your name">
        <a class="text-3xl font-bold underline " href="https://www.google.com">
            Google
        </a>

        <form class="text-3xl font-bold underline " id="form">
            <input type="text" placeholder="Enter your name">
            <br>
            <input type="email" placeholder="Enter your email">
            <br>
            <input type="password" placeholder="Enter your password">
            <br>
            <button type="submit">Submit</button>


            <br>
        </form>

        //login page 
        <div class="text-3xl font-bold underline " id="login">
            <h2>Login</h2>
            <input type="email" placeholder="Enter your email">
            <br>
            <input type="password" placeholder="Enter your password">
            <br>
            <button type="submit">Login</button>
        </div>

        //register page
        <div class="text-3xl font-bold underline " id="register">
            <h2>Register</h2>
            <input type="email" placeholder="Enter your email">
            <br>
            <input type="password" placeholder="Enter your password">
            <br>
            <button type="submit">Register</button>
        </div>

        //forgot password page
        <div class="text-3xl font-bold underline " id="forgot-password">
            <h2>Forgot Password</h2>
            <input type="email" placeholder="Enter your email">
            <br>
            <button type="submit">Forgot Password</button>
        </div>

        //reset password page
        <div class="text-3xl font-bold underline " id="reset-password">
            <h2>Reset Password</h2>
            <input type="password" placeholder="Enter your new password">
            <br>
            <button type="submit">Reset Password</button>
        </div>

        //profile page
        <div class="text-3xl font-bold underline " id="profile">
            <h2>Profile</h2>
            <input type="text" placeholder="Enter your name">
            <br>
            <input type="email" placeholder="Enter your email">
            <br>
            <button type="submit">Update Profile</button>
        </div>

        //logout page
        <div class="text-3xl font-bold underline " id="logout">
            <h2>Logout</h2>
            <button type="submit">Logout</button>
        </div>
    </div>

  </body>
</html>
